name: Build Windows release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows executable
        run: npm run build

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $asset = "dist/CodexPulse-$tag.exe"
          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset `
              --repo $env:GITHUB_REPOSITORY `
              --title "Codex Pulse $tag" `
              --notes "Windows x64 release for Codex Pulse $tag."
          }
